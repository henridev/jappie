<title>Jasper · Untappd (présentation)</title>
<style>
  :root{--amber:#FFC000;--amber-d:#e0a800;--ink:#14161b;--muted:#9aa0aa;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html,body{height:100%;background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1400px 900px at 50% -10%,#2a2310,#0d0b08 60%,#000);}
  .stage{width:1280px;height:720px;position:relative;transform-origin:center center;
    background:linear-gradient(135deg,#1b1d23 0%,#121319 55%,#0c0d11 100%);
    border-radius:20px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.7);}
  .topbar{position:absolute;top:0;left:0;right:0;height:56px;background:var(--amber);color:var(--ink);
    display:flex;align-items:center;gap:12px;padding:0 26px;z-index:5;}
  .topbar .mark{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--amber);
    display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;}
  .topbar .brand{font-weight:900;font-size:22px;letter-spacing:-.5px;}
  .topbar .who{margin-left:auto;font-weight:700;font-size:15px;opacity:.85;}
  .slide{position:absolute;top:56px;left:0;right:0;bottom:0;padding:40px 56px 52px;
    opacity:0;visibility:hidden;transition:opacity .45s ease;display:flex;}
  .slide.on{opacity:1;visibility:visible;}
  .center{flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;}
  .center .av{width:130px;height:130px;border-radius:50%;margin-bottom:24px;
    background:radial-gradient(circle at 32% 28%,#ffd34d,#f0a500);display:flex;align-items:center;justify-content:center;
    font-size:62px;border:4px solid var(--amber);box-shadow:0 14px 40px rgba(0,0,0,.5);}
  .center .av.leash{font-size:40px;gap:1px;}
  .center .av.leash .chain{font-size:26px;margin:0 -2px;}
  .center h1{font-size:56px;letter-spacing:-1px;margin-bottom:8px;}
  .center .handle{color:var(--amber);font-size:22px;font-weight:700;margin-bottom:30px;}
  .center .stats{display:flex;margin-bottom:30px;}
  .center .stat{padding:0 42px;}
  .center .stat b{display:block;font-size:44px;}
  .center .stat span{font-size:14px;text-transform:uppercase;letter-spacing:2px;color:#aab;}
  .center .stat+.stat{border-left:1px solid rgba(255,255,255,.14);}
  .center .tag{font-size:26px;color:#cfd3da;font-style:italic;max-width:860px;line-height:1.5;}
  .kicker{display:inline-block;background:var(--amber);color:var(--ink);font-size:17px;font-weight:800;
    letter-spacing:1.5px;text-transform:uppercase;padding:8px 20px;border-radius:30px;margin-bottom:30px;}
  .kicker.love{background:#e94f7c;color:#fff;}
  .center .lead{font-size:34px;line-height:1.45;color:#eef0f3;max-width:980px;font-weight:600;}
  .heart{font-size:72px;margin-bottom:16px;}
  .crewphoto{max-height:62%;max-width:78%;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.55);border:4px solid #fff;object-fit:contain;}
  /* check-in split */
  .ci{gap:50px;align-items:stretch;}
  .ci .left{flex:0 0 396px;display:flex;}
  .card{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.45);
    display:flex;flex-direction:column;width:100%;}
  .card .pic{flex:1 1 auto;min-height:0;background:#0f1117;overflow:hidden;position:relative;}
  .card .pic .picbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(22px) brightness(.45);transform:scale(1.15);}
  .card .pic img{position:relative;width:100%;height:100%;object-fit:contain;display:block;z-index:1;}
  .ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#fff;
    background:linear-gradient(150deg,var(--p1,#caa04a),var(--p2,#7a5a1a));}
  .ph .g{font-size:92px;filter:drop-shadow(0 5px 8px rgba(0,0,0,.35));}
  .ph .pn{font-size:26px;font-weight:800;}
  .ph .ps{font-size:14px;opacity:.85;}
  .card .meta{padding:16px 20px;}
  .metahead{display:flex;gap:12px;align-items:center;margin-bottom:4px;}
  .bthumb{width:50px;height:50px;border-radius:10px;overflow:hidden;flex:0 0 50px;background:#fff;border:1px solid #e7e9ec;
    display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .bthumb img{width:100%;height:100%;object-fit:contain;padding:2px;}
  .bthumb.cover img{object-fit:cover;padding:0;}
  .bthumb.blabel{color:#fff;font-weight:900;font-size:16px;letter-spacing:.5px;}
  .bnwrap{min-width:0;}
  .card .bn{font-size:24px;font-weight:900;color:#16181d;line-height:1.08;}
  .card .br{font-size:14px;color:#8a9099;margin-top:2px;}
  .card .caps{display:flex;gap:5px;margin:13px 0 15px;}
  .cap{width:28px;height:28px;}
  .chips{display:flex;border-top:1px solid #eceef1;}
  .chip{flex:1;text-align:center;padding:12px 4px;}
  .chip+.chip{border-left:1px solid #eceef1;}
  .chip b{display:block;font-size:20px;color:#16181d;}
  .chip span{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9aa0aa;}
  /* right: minimal, no script */
  .ci .right{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0;}
  .ci .right .head{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .ci .right .num{font-size:20px;font-weight:900;color:var(--amber);background:rgba(255,192,0,.12);
    border:1px solid rgba(255,192,0,.4);border-radius:12px;padding:5px 13px;}
  .ci .right .loc{font-size:18px;color:var(--muted);font-weight:600;}
  .ci .right .beerttl{font-size:30px;font-weight:800;color:#fff;letter-spacing:-.3px;margin-bottom:14px;opacity:.92;}
  .ci .right .beerttl .amb{color:var(--amber);}
  .ci .right .punch{font-size:50px;font-weight:900;color:#fff;line-height:1.12;letter-spacing:-1px;margin-bottom:34px;}
  .tags{display:flex;gap:12px;flex-wrap:wrap;}
  .tags .t{font-size:19px;font-weight:700;color:#e8eaee;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:9px 18px;}
  .tags .t::before{content:"•";color:var(--amber);margin-right:9px;}
  .progress{position:absolute;bottom:0;left:0;height:6px;background:var(--amber);width:0;transition:width .4s;z-index:6;}
  .pager{position:absolute;bottom:16px;right:24px;font-size:14px;color:var(--muted);z-index:6;font-weight:700;letter-spacing:1px;}
  .ctrls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:50;}
  .ctrls button{border:none;background:rgba(255,255,255,.12);color:#fff;font-size:14px;font-weight:700;
    padding:9px 16px;border-radius:24px;cursor:pointer;backdrop-filter:blur(6px);}
  .ctrls button:hover{background:rgba(255,255,255,.22);}
  .langsw{display:flex;gap:0;background:rgba(255,255,255,.10);border-radius:24px;overflow:hidden;margin-right:6px;}
  .langsw button{background:transparent;border-radius:0;padding:9px 14px;opacity:.7;}
  .langsw button.on{background:var(--amber);color:var(--ink);opacity:1;}
  .tip{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;
    font-size:13px;padding:8px 16px;border-radius:20px;z-index:50;}
  .clickzone{position:absolute;top:56px;bottom:0;width:30%;z-index:4;cursor:pointer;}
  .clickzone.prev{left:0;} .clickzone.next{right:0;}
</style></head>
